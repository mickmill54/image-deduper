name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Pyright type-check
        run: pyright

      - name: Pytest
        run: pytest -q

  release:
    name: Build + attach wheel and sdist to GitHub release
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write  # needed to upload assets to the release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload artifacts to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # If a release for this tag already exists (created manually with
          # custom notes), upload artifacts to it. Otherwise create one with
          # auto-generated notes so the workflow is self-sufficient.
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/*.whl dist/*.tar.gz --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/*.whl dist/*.tar.gz \
              --generate-notes \
              --title "${GITHUB_REF_NAME}"
          fi

  build-binary-macos:
    name: Build macOS arm64 standalone binary
    needs: test
    runs-on: macos-latest  # macos-14 = Apple Silicon (arm64)
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package + dev deps (incl. PyInstaller)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build standalone binary
        run: |
          pyinstaller \
            --onefile \
            --name dedupe \
            --clean \
            --noconfirm \
            --hidden-import pillow_heif \
            --hidden-import imagehash \
            src/dedupe/__main__.py

      - name: Smoke-test the binary
        run: |
          ./dist/dedupe --version
          ./dist/dedupe --help
          # Build a tiny fixture and confirm a real subcommand works
          mkdir -p /tmp/_smoke
          python -c "from PIL import Image; Image.new('RGB',(32,32),(200,30,30)).save('/tmp/_smoke/a.jpg','JPEG')"
          ./dist/dedupe info /tmp/_smoke

      - name: Rename for clarity (arch + os in filename)
        run: mv dist/dedupe dist/dedupe-macos-arm64

      - name: Upload macOS binary to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/dedupe-macos-arm64 --clobber
          else
            # Defensive: release should exist by the time this job runs
            # (the `release` job creates one if missing), but handle the
            # race where this job somehow lands first.
            gh release create "${GITHUB_REF_NAME}" dist/dedupe-macos-arm64 \
              --generate-notes \
              --title "${GITHUB_REF_NAME}"
          fi
